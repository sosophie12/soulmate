<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e9d5ff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="245" fill="url(#bg)"/>

  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Heart shape -->
  <g transform="translate(256, 270)" filter="url(#glow)">
    <path d="M0 60 C0 60 -100 -20 -100 -60 C-100 -100 -60 -120 -30 -110 C-10 -103 0 -85 0 -85 C0 -85 10 -103 30 -110 C60 -120 100 -100 100 -60 C100 -20 0 60 0 60Z"
          fill="url(#heart)" opacity="0.92"
          transform="scale(1.35)"/>
  </g>

  <!-- 4-pointed star on top of heart -->
  <g transform="translate(256, 200)" filter="url(#starGlow)">
    <path d="M0 -32 L6 -6 L32 0 L6 6 L0 32 L-6 6 L-32 0 L-6 -6 Z"
          fill="url(#star)" opacity="0.95"/>
  </g>

  <!-- Small stars around -->
  <g fill="#fde68a" opacity="0.7">
    <circle cx="150" cy="135" r="4"/>
    <circle cx="370" cy="150" r="3"/>
    <circle cx="120" cy="280" r="2.5"/>
    <circle cx="395" cy="265" r="3.5"/>
    <circle cx="180" cy="400" r="2"/>
    <circle cx="340" cy="390" r="2.5"/>
    <circle cx="310" cy="130" r="2"/>
    <circle cx="200" cy="160" r="2"/>
  </g>

  <!-- Sparkle small stars -->
  <g fill="white" opacity="0.5">
    <path transform="translate(155, 180) scale(0.35)" d="M0 -20 L3 -3 L20 0 L3 3 L0 20 L-3 3 L-20 0 L-3 -3 Z"/>
    <path transform="translate(365, 210) scale(0.3)" d="M0 -20 L3 -3 L20 0 L3 3 L0 20 L-3 3 L-20 0 L-3 -3 Z"/>
    <path transform="translate(320, 360) scale(0.25)" d="M0 -20 L3 -3 L20 0 L3 3 L0 20 L-3 3 L-20 0 L-3 -3 Z"/>
    <path transform="translate(190, 350) scale(0.2)" d="M0 -20 L3 -3 L20 0 L3 3 L0 20 L-3 3 L-20 0 L-3 -3 Z"/>
  </g>

  <!-- "S" letter -->
  <text x="256" y="295" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="100" font-weight="700" fill="#7c3aed" opacity="0.85" letter-spacing="-2">S</text>
</svg>
